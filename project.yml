name: FlickMatch
options:
  bundleIdPrefix: com.flickmatch
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "14.2"
  createIntermediateGroups: true

targets:
  FlickMatch:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - FlickMatch
    info:
      path: FlickMatch/Info.plist
      properties:
        CFBundleDisplayName: FlickMatch
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        UILaunchStoryboardName: LaunchScreen
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: false
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.flickmatch.app
      SWIFT_VERSION: "5.9"
      MARKETING_VERSION: "1.0"
      CURRENT_PROJECT_VERSION: "1"
