name: FlickMatch
options:
  bundleIdPrefix: com.flickmatch
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "16.2"
  createIntermediateGroups: true

packages:
  Firebase:
    url: https://github.com/firebase/firebase-ios-sdk.git
    version: "10.25.0"

targets:
  FlickMatch:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: FlickMatch
        excludes:
          - Info.plist
    dependencies:
      - package: Firebase
        product: FirebaseFirestore
      - package: Firebase
        product: FirebaseMessaging
    entitlements:
      path: FlickMatch/FlickMatch.entitlements
    settings:
      PRODUCT_NAME: FlickMatch
      PRODUCT_BUNDLE_IDENTIFIER: com.flickmatch.app
      SWIFT_VERSION: "5.9"
      MARKETING_VERSION: "1.3.1"
      CURRENT_PROJECT_VERSION: "1"
      GENERATE_INFOPLIST_FILE: YES
      INFOPLIST_KEY_CFBundleDisplayName: FlickMatch
      INFOPLIST_KEY_UILaunchStoryboardName: LaunchScreen
      INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: UIInterfaceOrientationPortrait
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      ALWAYS_SEARCH_USER_PATHS: NO
      DEVELOPMENT_TEAM: U85YJ96XU8
      CODE_SIGN_STYLE: Manual
      CODE_SIGN_IDENTITY: "Apple Distribution"
      PROVISIONING_PROFILE_SPECIFIER: "FlickMatch AppStore"
