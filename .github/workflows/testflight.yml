name: Deploy to TestFlight

on:
  push:
    tags:
      - 'v*'

jobs:
  deploy:
    name: Build & Upload to TestFlight
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 15
        run: sudo xcode-select -switch /Applications/Xcode_15.4.app || sudo xcode-select -switch /Applications/Xcode.app

      - name: Install Fastlane
        run: gem install fastlane --no-document

      - name: Decode secrets
        run: |
          mkdir -p ~/.private_keys
          echo "${{ secrets.APP_STORE_CONNECT_API_KEY }}" | base64 --decode > ~/.private_keys/AuthKey.p8
          echo "${{ secrets.CERTIFICATE_P12 }}" | base64 --decode > /tmp/cert.p12
          echo "${{ secrets.PROVISIONING_PROFILE }}" | base64 --decode > /tmp/profile.mobileprovision

      - name: Get profile name
        id: profile
        run: |
          PROFILE_NAME=$(/usr/libexec/PlistBuddy -c "Print :Name" /dev/stdin <<< $(/usr/bin/security cms -D -i /tmp/profile.mobileprovision))
          echo "name=$PROFILE_NAME" >> $GITHUB_OUTPUT

      - name: Generate Xcode Project
        run: |
          if command -v xcodegen &> /dev/null; then
            xcodegen generate
          fi

      - name: Build & Upload
        env:
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          API_KEY_PATH: ~/.private_keys/AuthKey.p8
          CERTIFICATE_PATH: /tmp/cert.p12
          CERTIFICATE_PASSWORD: ${{ secrets.CERTIFICATE_PASSWORD }}
          PROFILE_PATH: /tmp/profile.mobileprovision
          PROFILE_NAME: ${{ steps.profile.outputs.name }}
          TEAM_ID: ${{ secrets.TEAM_ID }}
        run: fastlane beta
