name: Deploy to TestFlight

on:
  push:
    tags:
      - 'v*'

jobs:
  deploy:
    name: Build & Upload to TestFlight
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 16
        run: |
          ls /Applications/Xcode_16*.app/ -d 2>/dev/null || true
          sudo xcode-select -switch /Applications/Xcode_16.2.app || sudo xcode-select -switch /Applications/Xcode_16.1.app || sudo xcode-select -switch /Applications/Xcode_16.0.app || sudo xcode-select -switch /Applications/Xcode.app
          xcodebuild -version

      - name: Install Fastlane
        run: gem install fastlane --no-document

      - name: Decode secrets
        run: |
          mkdir -p ~/.private_keys
          echo "${{ secrets.APP_STORE_CONNECT_API_KEY }}" | base64 --decode > ~/.private_keys/AuthKey.p8
          echo "${{ secrets.CERTIFICATE_P12 }}" | base64 --decode > /tmp/cert.p12
          echo "${{ secrets.PROVISIONING_PROFILE }}" | base64 --decode > /tmp/profile.mobileprovision
          echo "${{ secrets.GOOGLE_SERVICE_INFO_PLIST }}" | base64 --decode > FlickMatch/GoogleService-Info.plist

      - name: Install signing assets
        env:
          CERTIFICATE_PASSWORD: ${{ secrets.CERTIFICATE_PASSWORD }}
        run: |
          # Create and configure keychain
          security create-keychain -p "build" build.keychain-db
          security set-keychain-settings -lut 21600 build.keychain-db
          security unlock-keychain -p "build" build.keychain-db

          # Import certificate
          security import /tmp/cert.p12 -k build.keychain-db -P "$CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "build" build.keychain-db

          # Add to search list (keep existing + add ours)
          security list-keychains -d user -s build.keychain-db $(security list-keychains -d user | tr -d '"')

          # Verify cert is there
          security find-identity -v build.keychain-db | head -5

          # Install provisioning profile
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          PROFILE_UUID=$(/usr/libexec/PlistBuddy -c "Print :UUID" /dev/stdin <<< $(security cms -D -i /tmp/profile.mobileprovision))
          cp /tmp/profile.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/$PROFILE_UUID.mobileprovision
          echo "Profile UUID: $PROFILE_UUID"

      - name: Get profile name
        id: profile
        run: |
          PROFILE_NAME=$(/usr/libexec/PlistBuddy -c "Print :Name" /dev/stdin <<< $(security cms -D -i /tmp/profile.mobileprovision))
          echo "name=$PROFILE_NAME" >> $GITHUB_OUTPUT
          echo "Profile Name: $PROFILE_NAME"

      - name: Generate Xcode Project
        run: |
          if command -v xcodegen &> /dev/null; then
            xcodegen generate
          fi

      - name: Build & Upload
        env:
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          API_KEY_PATH: ~/.private_keys/AuthKey.p8
          PROFILE_NAME: ${{ steps.profile.outputs.name }}
          TEAM_ID: ${{ secrets.TEAM_ID }}
          FASTLANE_XCODEBUILD_SETTINGS_TIMEOUT: 120
          FASTLANE_XCODEBUILD_SETTINGS_RETRIES: 6
        run: fastlane beta
