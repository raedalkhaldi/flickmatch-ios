<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>FlickMatch</title>
<style>
  :root { --bg:#08080d; --card:#181822; --text:#eae6df; --dim:#7a7680; --gold:#d4a853; }
  * { box-sizing:border-box; }
  body { font-family: -apple-system, "Tajawal", "Helvetica Neue", Arial, sans-serif;
         background:var(--bg); color:var(--text); margin:0; padding:40px 20px;
         -webkit-font-smoothing:antialiased; }
  .wrap { max-width:640px; margin:0 auto; text-align:center; }
  .logo { font-size:64px; margin-bottom:10px; }
  h1 { font-size:36px; margin:0 0 6px; color:var(--gold); font-weight:900;
       letter-spacing:-0.5px; }
  .tagline { color:var(--dim); margin:0 0 36px; font-size:15px; }
  .links { display:flex; flex-direction:column; gap:12px; }
  a.card { display:block; background:var(--card); color:var(--text);
           padding:16px 20px; border-radius:14px; text-decoration:none;
           border:1px solid #222; transition:transform .12s ease, border-color .12s ease; }
  a.card:hover { transform:translateY(-1px); border-color:var(--gold); }
  a.card b { color:var(--gold); font-size:14px; display:block; margin-bottom:2px; }
  a.card span { color:var(--dim); font-size:12px; }
  footer { color:var(--dim); font-size:11px; margin-top:40px; }
  a.plain { color:var(--gold); text-decoration:none; }
</style>
</head>
<body>
<div class="wrap">
  <div class="logo">🎬</div>
  <h1>FlickMatch</h1>
  <p class="tagline">لاقي توأم ذوقك في الأفلام والمسلسلات</p>

  <div class="links">
    <a class="card" href="privacy.html"><b>سياسة الخصوصية</b><span>Privacy Policy</span></a>
    <a class="card" href="terms.html"><b>شروط الاستخدام</b><span>Terms of Use</span></a>
    <a class="card" href="support.html"><b>الدعم والتواصل</b><span>Support</span></a>
  </div>

  <footer>
    © 2026 FlickMatch · بيانات الأفلام من
    <a class="plain" href="https://www.themoviedb.org/">TMDB</a>
  </footer>
</div>
</body>
</html>
